<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> AKAN NAME GENERATOR</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    
    <h1>
        The Akan Name Generator
    </h1>
    <p>
        Akan names come from Ghanaian culture, where children are named based on the day they were born.
        The naming is more than just a name in this culture, it's connecting to each individual through names.

    </p> 
    <!-- akan form -->
    <div class="holder">

    <form id="akan-form">
<!-- Day -->
        <label for="day">Day:</label>
        <input type="number" id="day" placeholder=" day" required>

<!-- Month -->
        <label for="month">Month:</label>
        <input type="number" id="month" placeholder="month" required>
<!-- Year -->
        <label for="year">Year:</label>
        <input type="number" id="year" placeholder="year" required>

<!-- Gender -->
        <label>Gender:</label>

    <select id="gender" required>
        <option value="">Select gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

        <button type="submit">Your Akan Name is!</button>
    </form> 


<h2 id="results"></h2>


</div>

   <footer>
        <p>© Akan Name Generator</p>
    </footer>
    
    <script src="script.js"></script>

</body>
</html>
